name: Build

on:
  push:
    branches:
      - main


jobs:
  build:
    name: Build and analyze
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Validate SonarQube host configuration
        id: sonar-config
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          if [ -z "${SONAR_TOKEN}" ] || [ -z "${SONAR_HOST_URL}" ]; then
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          HOST_URL_LOWER="$(printf '%s' "${SONAR_HOST_URL}" | tr '[:upper:]' '[:lower:]')"
          if echo "${HOST_URL_LOWER}" | grep -Eq '(^|://)localhost([:/]|$)|(^|://)127\.[0-9]+\.[0-9]+\.[0-9]+([:/]|$)'; then
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
          else
            echo "enabled=true" >> "${GITHUB_OUTPUT}"
          fi
      - uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        if: ${{ steps.sonar-config.outputs.enabled == 'true' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      - name: Skip SonarQube scan when host is unreachable in CI
        if: ${{ steps.sonar-config.outputs.enabled != 'true' }}
        run: echo "Skipping SonarQube scan because SONAR_TOKEN or SONAR_HOST_URL is missing, or SONAR_HOST_URL points to localhost/127.0.0.1."
      # If you wish to fail your job when the Quality Gate is red, uncomment the
      # following lines. This would typically be used to fail a deployment.
