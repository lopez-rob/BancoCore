name: Build

on:
  push:
    branches:
      - main


jobs:
  build:
    name: Build and analyze
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Validate SonarQube host configuration
        id: sonar-config
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          python - <<'PY' >> "${GITHUB_OUTPUT}"
          import ipaddress
          import os
          from urllib.parse import urlparse

          token = os.environ.get("SONAR_TOKEN", "").strip()
          host_url = os.environ.get("SONAR_HOST_URL", "").strip()
          enabled = bool(token and host_url)

          if enabled:
              normalized_url = host_url if "://" in host_url else f"http://{host_url}"
              host = (urlparse(normalized_url).hostname or "").lower()
              if host == "localhost":
                  enabled = False
              else:
                  try:
                      if ipaddress.ip_address(host).is_loopback:
                          enabled = False
                  except ValueError:
                      pass

          print(f"enabled={'true' if enabled else 'false'}")
          PY
      - uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6.0.0
        if: ${{ steps.sonar-config.outputs.enabled == 'true' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      - name: Skip SonarQube scan when host is unreachable in CI
        if: ${{ steps.sonar-config.outputs.enabled != 'true' }}
        run: echo "Skipping SonarQube scan because SONAR_TOKEN or SONAR_HOST_URL is missing, or SONAR_HOST_URL points to localhost/127.x.x.x loopback."
      # If you wish to fail your job when the Quality Gate is red, uncomment the
      # following lines. This would typically be used to fail a deployment.
      # - uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
      #   timeout-minutes: 5
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
